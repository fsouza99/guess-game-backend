name: Build, Run and Test

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build, Run and Test
    runs-on: self-hosted
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          path: AppRepo

      - name: Build app
        run: dotnet build AppRepo\GuessGame.csproj

      - name: Checkout unit tests repo
        uses: actions/checkout@v4
        with:
          path: UnitTestRepo
          ref: master
          repository: fsouza99/guess-game-backend-unit-testing
          token: ${{ secrets.ACCESS_TOKEN }}

      - name: Run unit tests
        run: cd UnitTestRepo; dotnet test; cd ..

      - name: Run app
        run: Start-Process dotnet -ArgumentList "run", "--project", "AppRepo", "--nomsg", "--sqlite"

      - name: Checkout API test repo
        uses: actions/checkout@v4
        with:
          path: ApiTestRepo
          ref: master
          repository: fsouza99/guess-game-backend-testing
          token: ${{ secrets.ACCESS_TOKEN }}

      - name: Run API tests
        run: cd ApiTestRepo; pytest; cd ..